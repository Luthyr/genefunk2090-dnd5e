name: Release Foundry Module

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.5"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release assets
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        id: release
        shell: pwsh
        run: |
          $tag = "${{ github.event.release.tag_name }}"

          if (-not $tag) {
            $tag = "${{ github.event.inputs.tag }}"
          }

          if (-not $tag) {
            $tag = "${env:GITHUB_REF_NAME}"
          }

          if ($tag -notmatch '^v\d+\.\d+\.\d+(-[A-Za-z0-9.-]+)?$') {
            throw "Release tag must look like v0.1.5. Got: $tag"
          }

          $version = $tag.Substring(1)
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Write release manifest values
        shell: pwsh
        run: |
          $tag = "${{ steps.release.outputs.tag }}"
          $version = "${{ steps.release.outputs.version }}"
          $repo = "${{ github.repository }}"

          $manifest = Get-Content module.json | ConvertFrom-Json
          $manifest.version = $version
          $manifest.url = "https://github.com/$repo"
          $manifest.manifest = "https://github.com/$repo/releases/download/$tag/module.json"
          $manifest.download = "https://github.com/$repo/releases/download/$tag/genefunk2090-dnd5e.zip"

          $manifest | ConvertTo-Json -Depth 20 | Set-Content module.json -Encoding UTF8
          Get-Content module.json

      - name: Build release assets
        shell: pwsh
        run: .\tools\package-release.ps1

      - name: Verify release zip
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead((Resolve-Path "dist/genefunk2090-dnd5e.zip"))
          try {
            $names = $zip.Entries | Select-Object -ExpandProperty FullName
            foreach ($required in @(
              "module.json",
              "README.md",
              "scripts/main.js",
              "styles/genefunk.css",
              "source-import/starter-items.json",
              "source-import/starter-actors.json"
            )) {
              if ($names -notcontains $required) {
                throw "Release zip missing $required"
              }
            }

            if ($names | Where-Object { $_ -like "packs/*" }) {
              throw "Release zip unexpectedly contains packs/. Do not ship placeholder compendium folders."
            }
          }
          finally {
            $zip.Dispose()
          }

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          files: |
            dist/module.json
            dist/genefunk2090-dnd5e.zip
          fail_on_unmatched_files: true
          make_latest: true
